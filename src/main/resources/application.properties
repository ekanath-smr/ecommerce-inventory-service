spring.application.name=ecommerce-inventory-service
server.port=8070

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/inventoryService
spring.datasource.username=inventoryServiceUser
#spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# HikariCP tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# ================= SECURITY =================
jwt.secret=e+4GyEUY2A7k4r1TtEXBFCTg/u0SRs/e9WIdpee2FAE=

# ================= EXTERNAL SERVICES =================
product.service.url=http://localhost:8080

# ================= RESILIENCE4J =================
resilience4j.circuitbreaker.instances.productService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.productService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.productService.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.retry.instances.productService.maxAttempts=3
resilience4j.retry.instances.productService.waitDuration=500ms

# ================= LOGGING =================
logging.level.root=INFO
logging.level.com.example.ecommerce_inventory_service=DEBUG

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always